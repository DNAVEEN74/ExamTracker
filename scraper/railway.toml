[build]
builder = "nixpacks"
buildCommand = "npm install && npx playwright install chromium --with-deps"

[deploy]
restartPolicyType = "always"

# ── Railway Cron Service Setup ────────────────────────────────────────────────
# Create 2 separate Railway cron services all pointing to this repo.
# They are staggered by 30 minutes so they NEVER run at the same time.
# This ensures zero parallel billing on Railway, maximizing the $5 Hobby credit.
#
# Service 1 — examtracker-fast
#   Start:    node index.js
#   Cron:     0 */3 * * *          (every 3 hours: 00:00, 03:00, 06:00...)
#   Env:      PRIORITY_FILTER=P0,P1
#
# Service 2 — examtracker-slow
#   Start:    node index.js
#   Cron:     30 1,13 * * *        (1:30 AM and 1:30 PM UTC)
#   Env:      PRIORITY_FILTER=P2,P3
#
# Shared env vars (set via Railway shared variables on all 4 services):
#   DATABASE_URL,
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET_NAME,
#   PARSING_WEBHOOK_URL, SCRAPER_WEBHOOK_SECRET,
#   GEMINI_API_KEY, GEMINI_CLASSIFIER_RPM,
#   SCRAPE_CONCURRENCY, REQUEST_DELAY_MS, LOG_LEVEL
